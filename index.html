<!DOCTYPE html>
<html>
<head>
<title>CA MCQ PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f172a);
color:white;
text-align:center;
}

.box{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
width:90%;
max-width:750px;
margin:auto;
margin-top:25px;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
padding:12px;
width:80%;
margin:8px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{transform:scale(1.05);}

.start{background:#22c55e;color:white;}
.next{background:#3b82f6;color:white;}
.submit{background:#ef4444;color:white;}

.opt{
background:white;
color:black;
padding:12px;
margin:8px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.opt:hover{
background:#e0f2fe;
}

.selected{
background:#facc15 !important;
color:black !important;
font-weight:bold;
}

/* progress bar */
#bar{
height:8px;
background:#334155;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}
#fill{
height:100%;
width:0%;
background:#22c55e;
transition:0.3s;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h1>📘 CA MCQ LOGIN</h1>

<input id="phone" placeholder="📱 Phone"><br>
<input id="email" placeholder="📧 Email"><br>
<input id="pass" type="password" placeholder="🔐 Password"><br>

<button class="start" onclick="sendOTP()">Send OTP</button><br>

<input id="otp" placeholder="Enter OTP"><br>

<button class="start" onclick="login()">Login</button>
</div>

<!-- START -->
<div class="box" id="startBox" style="display:none;">
<h1>🚀 Ready for CA Exam?</h1>
<button class="start" onclick="startTest()">Start Exam</button>
</div>

<!-- TEST -->
<div class="box" id="testBox" style="display:none;">

<h3>⏱ Time: <span id="time">100:00</span></h3>

<div id="bar"><div id="fill"></div></div>

<h2 id="qno"></h2>
<p id="question"></p>

<div id="options"></div>

<button class="next" onclick="nextQ()">Next ➡️</button>
<button class="submit" onclick="submitTest()">Submit</button>

</div>

<!-- RESULT -->
<div class="box" id="resultBox" style="display:none;">
<h1>📊 Result</h1>
<h2 id="score"></h2>
<h1 id="emoji"></h1>
</div>

<script>

let questions=[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"Capital of India?",o:["Mumbai","Delhi","Kolkata","Chennai"],a:1},
{q:"Depreciation kya hota hai?",o:["Increase","Decrease","Profit","Loan"],a:1}
];

let current=0;
let ans=[];
let time=6000;
let otpCode="";

/* OTP */
function sendOTP(){
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;

if(phone==""||email==""){
alert("Fill all fields");
return;
}

otpCode=Math.floor(100000+Math.random()*900000);
alert("OTP sent to "+email+"\nOTP: "+otpCode);
}

/* LOGIN */
function login(){
let otp=document.getElementById("otp").value;

if(otp!=otpCode){
alert("Wrong OTP");
return;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("startBox").style.display="block";
}

/* START */
function startTest(){
document.getElementById("startBox").style.display="none";
document.getElementById("testBox").style.display="block";
loadQ();
timer();
progress();
}

/* LOAD QUESTION */
function loadQ(){
let q=questions[current];

document.getElementById("qno").innerText="Q"+(current+1)+" / "+questions.length;
document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((v,i)=>{
html+=`<div class='opt' onclick='select(this,${i})'>${v}</div>`;
});

document.getElementById("options").innerHTML=html;

/* restore */
setTimeout(()=>{
let opts=document.querySelectorAll(".opt");
opts.forEach(o=>o.classList.remove("selected"));

if(ans[current]!=undefined){
opts[ans[current]].classList.add("selected");
}
},50);
}

/* SELECT OPTION */
function select(el,i){
ans[current]=i;

document.querySelectorAll(".opt").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

/* NEXT */
function nextQ(){
if(current<questions.length-1){
current++;
loadQ();
progress();
}
}

/* PROGRESS BAR */
function progress(){
let percent=((current)/questions.length)*100;
document.getElementById("fill").style.width=percent+"%";
}

/* SUBMIT */
function submitTest(){
let score=0;

for(let i=0;i<questions.length;i++){
if(ans[i]==questions[i].a) score++;
else score-=0.25;
}

document.getElementById("testBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("score").innerText="Score: "+score;

/* 🕺 ONLY BOY EMOJI SYSTEM */
if(score>=2){
document.getElementById("emoji").innerText="🕺 Excellent Performance";
}
else if(score>=1){
document.getElementById("emoji").innerText="🕺 Average Performance";
}
else{
document.getElementById("emoji").innerText="🕺 Need Improvement";
}
}

/* TIMER */
function timer(){
setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;

document.getElementById("time").innerText=m+":"+s;

/* last minute warning */
if(time<60){
document.getElementById("time").style.color="red";
}

if(time<=0){
submitTest();
}
},1000);
}

</script>

</body>
</html>
