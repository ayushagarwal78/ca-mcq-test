<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CA MCQ Exam Pro</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:520px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

h1{text-align:center;}

#timer{
  text-align:right;
  font-weight:bold;
  color:red;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.start{background:#2ecc71;color:white;}
.next{background:#3498db;color:white;}
.submit{background:#e74c3c;color:white;}

.option{
  background:#f2f2f2;
  margin-top:8px;
}

.option.selected{
  background:#b2bec3;
}

.hide{display:none;}

.result{text-align:center;}

</style>
</head>

<body>

<div class="container">

<h1>CA MCQ Exam</h1>
<div id="timer">Time: 100:00</div>

<div id="start">
  <button class="start" onclick="startTest()">Start Exam</button>
</div>

<div id="quiz" class="hide">

  <h3 id="question"></h3>
  <div id="options"></div>

  <button class="next" onclick="next()">Next</button>
  <button class="submit" onclick="finish()">Submit</button>

</div>

<div id="result" class="hide result">
  <h2>Your Result</h2>
  <h1 id="score"></h1>
  <p id="grade"></p>
</div>

</div>

<script>

let questions = [

/* =================================================
👉 YAHI PE TUM 120 MCQ ADD KAROGE
FORMAT SAME RAKHNA
================================================= */

{
  q: "Capital of India?",
  options: ["Mumbai","Delhi","Kolkata","Chennai"],
  answer: 1
},

{
  q: "2 + 2 = ?",
  options: ["3","4","5","6"],
  answer: 1
}

/* 👉 Aise hi 120 tak add karo */

];

let i = 0;
let score = 0;
let selected = -1;
let time = 100 * 60;
let timer;

function startTest(){
  document.getElementById("start").classList.add("hide");
  document.getElementById("quiz").classList.remove("hide");
  loadQ();
  startTimer();
}

function startTimer(){
  timer = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
    "Time: " + m + ":" + (s<10?"0"+s:s);

    if(time <= 0){
      finish();
    }
  },1000);
}

function loadQ(){
  selected = -1;

  let q = questions[i];
  document.getElementById("question").innerText =
  (i+1) + ". " + q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.options.forEach((opt,index)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.classList.add("option");

    btn.onclick = ()=>{
      selected = index;
      document.querySelectorAll(".option").forEach(b=>{
        b.classList.remove("selected");
      });
      btn.classList.add("selected");
    }

    box.appendChild(btn);
  });
}

function next(){
  if(selected == questions[i].answer){
    score += 1;
  } else {
    score -= 0.25;
  }

  i++;

  if(i < questions.length){
    loadQ();
  } else {
    finish();
  }
}

function finish(){
  clearInterval(timer);

  document.getElementById("quiz").classList.add("hide");
  document.getElementById("result").classList.remove("hide");

  document.getElementById("score").innerText =
  "Score: " + score.toFixed(2);

  let percent = (score/questions.length)*100;

  let grade = percent>=80?"Excellent":percent>=50?"Good":"Need Improvement";

  document.getElementById("grade").innerText = grade;
}

</script>

</body>
</html>
