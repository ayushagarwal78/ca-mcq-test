<!DOCTYPE html>
<html>
<head>
<title>CA MCQ Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f172a);
color:white;
text-align:center;
}

/* GLASS BOX */
.box{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
width:90%;
max-width:700px;
margin:auto;
padding:25px;
border-radius:18px;
margin-top:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* INPUT */
input{
padding:12px;
width:80%;
margin:8px;
border-radius:10px;
border:none;
outline:none;
}

/* BUTTONS */
button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* COLORS */
.start{background:#22c55e;color:white;}
.next{background:#3b82f6;color:white;}
.submit{background:#ef4444;color:white;}
.opt{
background:white;
color:black;
padding:12px;
margin:8px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}
.opt:hover{
background:#e0f2fe;
}

/* TITLE */
h1{
font-size:32px;
}
</style>

</head>

<body>

<div class="box" id="loginBox">
<h1>📘 CA MCQ TEST</h1>
<h3>Login</h3>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button class="start" onclick="login()">Login</button>
</div>

<div class="box" id="startBox" style="display:none;">
<h1>🚀 Ready for Exam?</h1>
<button class="start" onclick="startTest()">Start Test</button>
</div>

<div class="box" id="testBox" style="display:none;">
<h3>⏱ Time Left: <span id="time">100:00</span></h3>

<h2 id="qno"></h2>
<p id="question"></p>

<div id="options"></div>

<button class="next" onclick="nextQ()">Next ➡️</button>
<button class="submit" onclick="submitTest()">Submit ✅</button>
</div>

<div class="box" id="resultBox" style="display:none;">
<h1>📊 Result</h1>
<h2 id="score"></h2>
<h1 id="emoji"></h1>
</div>

<script>

let questions = [
  {q:"2+2=?", o:["3","4","5","6"], a:1},
  {q:"Capital of India?", o:["Mumbai","Delhi","Kolkata","Chennai"], a:1}
];

let current=0;
let ans=[];
let time=6000;

function login(){
document.getElementById("loginBox").style.display="none";
document.getElementById("startBox").style.display="block";
}

function startTest(){
document.getElementById("startBox").style.display="none";
document.getElementById("testBox").style.display="block";
loadQ();
timer();
}

function loadQ(){
let q=questions[current];
document.getElementById("qno").innerText="Q"+(current+1);
document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((v,i)=>{
html+=`<div class='opt' onclick='select(${i})'>${v}</div>`;
});
document.getElementById("options").innerHTML=html;
}

function select(i){
ans[current]=i;
}

function nextQ(){
if(current<questions.length-1){
current++;
loadQ();
}
}

function submitTest(){
let score=0;

for(let i=0;i<questions.length;i++){
if(ans[i]==questions[i].a) score++;
else score-=0.25;
}

document.getElementById("testBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("score").innerText="Score: "+score;

/* 🎭 EMOJI SYSTEM */
if(score>=2){
document.getElementById("emoji").innerText="💃 Excellent Performance!";
}
else if(score>=1){
document.getElementById("emoji").innerText="☺️ Average Performance";
}
else if(score>0){
document.getElementById("emoji").innerText="🕺 Keep Trying!";
}
else{
document.getElementById("emoji").innerText="😥 Need Improvement";
}
}

function timer(){
setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("time").innerText=m+":"+s;

if(time<=0){
submitTest();
}
},1000);
}

</script>

</body>
</html>
