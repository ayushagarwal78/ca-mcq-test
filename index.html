<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Foundation Eco Pro Quiz</title>
    <style>
        :root { --primary: #4834d4; --secondary: #686de0; --success: #2ecc71; --error: #eb4d4b; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; font-weight: bold; }
        .primary-btn { background: var(--primary); color: white; padding: 12px 25px; width: 100%; }
        .primary-btn:hover { background: var(--secondary); }
        .hidden { display: none; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #f8f9fa; border: 2px solid #eee; text-align: left; }
        .option-btn.selected { border-color: var(--primary); background: #eef2ff; }
        .timer-box { background: #2d3436; color: #fab1a0; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- 1. Login Screen -->
    <div id="login-screen" class="card">
        <h2 style="color: var(--primary)">CA ECO MASTERY LOGIN</h2>
        <p>Enter your credentials to enter the arena</p>
        <input type="text" id="login-no" placeholder="Mobile Number (e.g. 9876543210)">
        <input type="password" id="login-pass" placeholder="Password (Same as Mobile No.)">
        <button class="primary-btn" onclick="handleLogin()">CHALLENGE ACCEPTED (Login)</button>
    </div>

    <!-- 2. Chapter Selection -->
    <div id="chapter-screen" class="card hidden">
        <h2>Select Chapter</h2>
        <button class="primary-btn" style="margin-bottom:10px" onclick="startQuiz('Intro')">Intro to Business Economics</button>
        <button class="primary-btn" onclick="startQuiz('Demand')">Theory of Demand & Supply</button>
    </div>

    <!-- 3. Quiz Arena -->
    <div id="quiz-screen" class="card hidden">
        <div class="timer-box">Time Left: <span id="time-left">20:00</span></div>
        <div id="q-number" style="font-weight:bold; color:gray">Question 1/25</div>
        <h3 id="question-text">Question Loading...</h3>
        <div id="options-bin"></div>
        <div class="nav-btns">
            <button class="primary-btn" onclick="nextQuestion()">NEXT QUESTION</button>
            <button class="primary-btn" style="background:#636e72" onclick="showResult()">SUBMIT QUIZ</button>
        </div>
    </div>

    <!-- 4. Result Screen -->
    <div id="result-screen" class="card hidden">
        <h1 id="emoji-display">🎓</h1>
        <h2>Performance Report</h2>
        <div style="font-size: 1.2rem; margin: 20px 0;">
            <p>Total Score: <span id="final-score" style="font-weight:bold">0</span></p>
            <p style="font-size: 0.9rem; color: gray;">(Correct: +1 | Incorrect: -0.25)</p>
        </div>
        <button class="primary-btn" onclick="location.reload()">TRY AGAIN</button>
    </div>

<script>
    // System Config
    const allowedUsers = ["9876543210", "1234567890"]; // Add your numbers here
    let questions = []; // This would normally hold 25 MCQ per chapter
    let currentQ = 0;
    let score = 0;
    let timerInterval;
    let userAnswers = {};

    // Mock Questions (Aap yahan 25 questions add kar sakte hain)
    const db = {
        Intro: [
            { q: "Economics is a _____ science?", a: ["Social", "Pure", "Physical", "None"], c: 0 },
            { q: "Who wrote 'Wealth of Nations'?", a: ["Marshall", "Adam Smith", "Pigou", "Robbins"], c: 1 },
            // ... add more
        ],
        Demand: [
            { q: "Demand curve usually slopes?", a: ["Upward", "Downward", "Horizontal", "Vertical"], c: 1 },
            // ... add more
        ]
    };

    function handleLogin() {
        const no = document.getElementById('login-no').value;
        const pass = document.getElementById('login-pass').value;

        if (allowedUsers.includes(no) && no === pass) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chapter-screen').classList.remove('hidden');
        } else {
            alert("Error: Valid Number & Matching Password Required!");
        }
    }

    function startQuiz(chapter) {
        questions = db[chapter];
        document.getElementById('chapter-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
        startTimer(20 * 60); // 20 Minutes
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        timerInterval = setInterval(() => {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            document.getElementById('time-left').textContent = `${minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
            if (--timer < 0) { clearInterval(timerInterval); showResult(); }
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-number').innerText = `Question ${currentQ + 1}/${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        const bin = document.getElementById('options-bin');
        bin.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            if(userAnswers[currentQ] === i) btn.classList.add('selected');
            btn.innerText = opt;
            btn.onclick = () => {
                userAnswers[currentQ] = i;
                loadQuestion(); // Refresh to show selected
            };
            bin.appendChild(btn);
        });
    }

    function nextQuestion() {
        if(currentQ < questions.length - 1) {
            currentQ++;
            loadQuestion();
        } else {
            alert("Last question! Click SUBMIT to finish.");
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        score = 0;
        questions.forEach((q, i) => {
            if(userAnswers[i] === q.c) score += 1;
            else if(userAnswers[i] !== undefined) score -= 0.25;
        });

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        const emoji = document.getElementById('emoji-display');
        if(score >= questions.length * 0.8) emoji.innerText = "🔥 LEGENDARY (Best)";
        else if(score < 0) emoji.innerText = "💀 DISASTER (Worst)";
        else emoji.innerText = "👍 GOOD EFFORT";
    }
</script>
</body>
</html>
